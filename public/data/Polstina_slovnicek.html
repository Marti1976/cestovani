<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Polská slovíčka — poslech</title>
<style>
  :root{
    --bg:#faf8f4; --card:#ffffff; --navy:#16233f; --navy-2:#24365c;
    --red:#c8102e; --red-light:#fdecef; --grey:#6b6f76; --grey-light:#eeece5;
    --border:#e6e3db;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .hero{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff; padding:22px 20px 20px; position:relative;
  }
  .hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:var(--red);}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9fb0d6;margin:0;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;flex-shrink:0;
    background:rgba(255,255,255,0.12);color:#fff;text-decoration:none;
    font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:20px;
    border:1px solid rgba(255,255,255,0.28);white-space:nowrap;
  }
  .back-btn:active{background:rgba(255,255,255,0.28);}
  .hero h1{font-size:21px;font-weight:800;margin:0 0 4px;letter-spacing:-0.01em;}
  .hero p{font-size:13px;color:#c7cee0;margin:0;line-height:1.5;}
  .section{padding:16px 14px 32px;}

  .controls{ margin-bottom:12px; }
  .tabs{ display:flex; gap:5px; background:var(--grey-light); padding:3px; border-radius:10px; margin-bottom:8px; }
  .tab{
    flex:1; border:none; background:transparent; padding:9px 6px; border-radius:8px;
    font-size:12.5px; font-weight:700; color:var(--grey); cursor:pointer; white-space:nowrap;
    min-height:38px;
  }
  .tab.active{ background:#fff; color:var(--navy); box-shadow:0 1px 2px rgba(0,0,0,0.08); }
  .search{
    width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border);
    font-size:16px; background:#fff; color:var(--navy);
  }
  .search:focus{ outline:2px solid var(--red); outline-offset:-1px; }

  .toggle-row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:10px 0; font-size:12.5px; color:var(--grey); }
  .check{ display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; padding:4px 0; }
  .check input{ accent-color:var(--red); width:16px; height:16px; }
  .speed{ display:flex; gap:3px; background:var(--grey-light); padding:2px; border-radius:8px; }
  .speed button{ border:none; background:transparent; padding:7px 10px; border-radius:6px; font-size:12px; cursor:pointer; color:var(--grey); font-weight:700; min-height:32px; white-space:nowrap; }
  .speed button.active{ background:#fff; color:var(--navy); }
  .stopbtn{
    margin-left:auto; border:1px solid var(--border); background:#fff; color:var(--red);
    padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer; min-height:36px;
  }
  .playallbtn{
    border:none; background:var(--navy); color:#fff;
    padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer; min-height:36px;
    display:inline-flex; align-items:center; gap:6px;
  }
  .playallbtn:disabled{ opacity:0.55; cursor:not-allowed; }
  .playallbtn.playing{ background:var(--red); }
  .tab:disabled, .search:disabled, .speed button:disabled, .check input:disabled{ opacity:0.55; cursor:not-allowed; }
  .note{ font-size:11.5px; color:var(--grey); background:var(--grey-light); border-radius:9px; padding:9px 11px; margin-bottom:14px; line-height:1.5; }

  .cat{ margin-bottom:9px; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--card); }
  .cat-head{
    display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
    padding:12px 14px; cursor:pointer; background:#fbfaf7;
  }
  .cat-name{ font-size:13.5px; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
  .cat-count{ font-size:10.5px; font-weight:600; color:var(--grey); background:var(--grey-light); padding:2px 7px; border-radius:20px; flex-shrink:0; }
  .play-all{
    border:none; background:var(--red-light); color:var(--red); font-size:11.5px; font-weight:700;
    padding:7px 11px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:4px;
    flex-shrink:0; min-height:32px;
  }
  .chev{ transition:transform 0.15s; color:var(--grey); font-size:11px; flex-shrink:0; }
  .cat.open .chev{ transform:rotate(90deg); }
  .cat-list{ display:none; }
  .cat.open .cat-list{ display:block; }

  .row{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-top:1px solid var(--border); }
  .row:nth-child(odd){ background:#fdfcfa; }
  .row-text{ flex:1; min-width:0; }
  .cz{ font-size:11.5px; color:var(--grey); margin-bottom:2px; line-height:1.4; }
  .pl{ font-size:14.5px; font-weight:700; color:var(--navy-2); line-height:1.35; }
  .pron{ font-size:11.5px; color:var(--grey); font-style:italic; margin-top:2px; line-height:1.4; }
  .play{
    flex-shrink:0; width:40px; height:40px; border-radius:50%; border:none;
    background:var(--navy); color:#fff; cursor:pointer; font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .play:active{ background:var(--red); }
  .play.playing{ background:var(--red); }
  .empty{ text-align:center; padding:30px 10px; color:var(--grey); font-size:13px; }

  @media (min-width:600px){
    .section{ padding:22px 24px 32px; }
    .hero{ padding:28px 24px 24px; }
    .hero h1{ font-size:24px; }
    .tabs{ display:inline-flex; width:auto; }
    .tab{ flex:none; padding:8px 16px; }
  }
</style>
</head>

<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <p class="hero-eyebrow">Poslech s výslovností</p>

  </div>
  <div class="section" id="app-root"></div>
</div>

    else { btn.classList.remove('playing'); btn.textContent = '▶ Přehrát celý blok'; btn.disabled = false; }
  }

  // ---- Podpora přehrávání na pozadí / při zamčené obrazovce ----
  // 1) Wake Lock: nedovolí telefonu zhasnout displej (hlavní příčina přerušení).
  // 2) Media Session + tichý smyčkový <audio>: prohlížeč pak stránku bere jako
  //    "přehrávač média" a dá jí oprávnění běžet i na pozadí (hlavně Android/Chrome).
  // 3) "Heartbeat" pause/resume: obchází známý bug Chrome, kde se speechSynthesis
  //    sama zasekne po ~15 s i na popředí.
  let wakeLock = null;
  const keepAliveAudio = document.getElementById('keepalive-audio');
  let heartbeatTimer = null;

  async function requestWakeLock(){
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      }
    } catch (e) { /* není podporováno / stránka není přes HTTPS — tiše ignorujeme */ }
  }
  function releaseWakeLock(){
    if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && (state.playingAllBlock || state.playingBtn)) {
      requestWakeLock();
    }
  });

  function startBackgroundSupport(title){
    requestWakeLock();
    if (keepAliveAudio) { keepAliveAudio.play().catch(() => {}); }
    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: title || 'Polská slovíčka',
          artist: 'Poslech s výslovností',
          album: 'Polština na cestu',
        });
        navigator.mediaSession.playbackState = 'playing';
        navigator.mediaSession.setActionHandler('pause', () => stopAll());
        navigator.mediaSession.setActionHandler('stop', () => stopAll());
        navigator.mediaSession.setActionHandler('play', () => {}); // není co "obnovit", jen ať tlačítko něco dělá
      } catch (e) { /* Media Session není podporována — ignorujeme */ }
    }
    if (!heartbeatTimer) {
      heartbeatTimer = setInterval(() => {
        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.pause();
          window.speechSynthesis.resume();
        }
      }, 10000);
    }
  }
  function stopBackgroundSupport(){
    releaseWakeLock();
    if (keepAliveAudio) { keepAliveAudio.pause(); keepAliveAudio.currentTime = 0; }
    if ('mediaSession' in navigator) {
      try { navigator.mediaSession.playbackState = 'none'; } catch(e){}
    }
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  }

  let playToken = 0;

  function stopAll(){
    playToken++; // invaliduje jakoukoliv rozehranou frontu/pauzu
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (state.playingBtn) { state.playingBtn.classList.remove('playing'); state.playingBtn = null; }
    state.playingAllBlock = false;
    setPlayAllBtnState(false);
    lockControls(false);
    stopBackgroundSupport();
  }

  // Přehraje utterances jedna po druhé; každá utterance nese vlastní pauzu
  // (u._gap), která se čeká AŽ PO jejím dohrání. Token zajistí, že staré
  // přehrávání "neožije" po stisknutí Zastavit.
  function speakSequence(utterances, onDone){
    const myToken = playToken;
    let i = 0;
    function next(){
      if (myToken !== playToken) return;
      if (i >= utterances.length) { if (onDone) onDone(); return; }
      const u = utterances[i++];
      const gap = (u._gap != null) ? u._gap : 300;
      const advance = () => { if (myToken === playToken) setTimeout(() => { if (myToken === playToken) next(); }, gap); };
      u.onend = advance;
      u.onerror = advance;
      window.speechSynthesis.speak(u);
    }
    next();
  }

  // Předvolby pauz: slova (Top 50 / Rozšířená) potřebují kratší mezery,
  // celé fráze (100 frází) delší — je potřeba stihnout je vyslovit.
  const GAPS = {
    words:   { normal: { afterCz: 150, afterPl: 600  }, repeat: { afterCz: 150, afterPl: 1400, afterRepeat: 900  } },
    phrases: { normal: { afterCz: 200, afterPl: 900  }, repeat: { afterCz: 200, afterPl: 3000, afterRepeat: 1500 } },
  };

  // Sestaví sekvenci utterances pro jedno slovo/frázi:
  // [čeština] -malá pauza- [polština] -pauza- (+ v režimu opakování: [polština znovu] -pauza-)
  function buildUtterances(cz, pl, isPhrase){
    const preset = GAPS[isPhrase ? 'phrases' : 'words'][state.mode];
    const utterances = [];
    const vCz = pickVoice('cs');
    const vPl = pickVoice('pl');
    if (state.speakCz) {
      const uCz = new SpeechSynthesisUtterance(cz.replace(/\(.*?\)/g, ''));
      uCz.lang = 'cs-CZ';
      if (vCz) uCz.voice = vCz;
      uCz._gap = preset.afterCz;
      utterances.push(uCz);
    }
    const uPl = new SpeechSynthesisUtterance(pl);
    uPl.lang = 'pl-PL';
    if (vPl) uPl.voice = vPl;
    uPl._gap = preset.afterPl;
    utterances.push(uPl);
    if (state.mode === 'repeat') {
      const uPl2 = new SpeechSynthesisUtterance(pl);
      uPl2.lang = 'pl-PL';
      if (vPl) uPl2.voice = vPl;
      uPl2._gap = preset.afterRepeat;
      utterances.push(uPl2);
    }
    return utterances;
  }

  function speakAllBlock(){
    if (!window.speechSynthesis) {
      alert('Tento prohlížeč bohužel nepodporuje hlasový výstup (Web Speech API).');
      return;
    }
    if (state.playingAllBlock) return;
    stopAll();
    const cats = DATA[state.tab];
    const isPhrase = state.tab === 'phrases';
    const utterances = [];
    cats.forEach(cat => {
      cat.words.forEach(w => {
        utterances.push(...buildUtterances(w.cz, w.pl, isPhrase));
      });
    });
    if (!utterances.length) return;
    state.playingAllBlock = true;
    setPlayAllBtnState(true);
    lockControls(true);
    startBackgroundSupport('Přehrává se celý blok');
    speakSequence(utterances, () => {
      state.playingAllBlock = false;
      setPlayAllBtnState(false);
      lockControls(false);
      stopBackgroundSupport();
    });
  }

  function speakWord(cz, pl, btn){
    if (!window.speechSynthesis) {
      alert('Tento prohlížeč bohužel nepodporuje hlasový výstup (Web Speech API).');
      return;
    }
    stopAll();
    if (btn) { btn.classList.add('playing'); state.playingBtn = btn; }
    const isPhrase = state.tab === 'phrases';
    const utterances = buildUtterances(cz, pl, isPhrase);
    startBackgroundSupport(pl);
    speakSequence(utterances, () => {
      if (btn) btn.classList.remove('playing');
      if (state.playingBtn === btn) state.playingBtn = null;
      stopBackgroundSupport();
    });
  }

  function speakCategory(words){
    stopAll();
    const isPhrase = state.tab === 'phrases';
    const utterances = [];
    words.forEach(w => { utterances.push(...buildUtterances(w.cz, w.pl, isPhrase)); });
    startBackgroundSupport('Přehrává se kategorie');
    speakSequence(utterances, () => stopBackgroundSupport());
  }

  function matches(word, q){
    if (!q) return true;
    q = q.toLowerCase();
    return word.cz.toLowerCase().includes(q) || word.pl.toLowerCase().includes(q);
  }

  function render(){
    const root = document.getElementById('app-root');
    const cats = DATA[state.tab];
    const q = state.query.trim();

    let visibleCats = cats.map(cat => ({
      ...cat,
      words: cat.words.filter(w => matches(w, q)),
    })).filter(cat => cat.words.length > 0);

    if (q && visibleCats.length) {
      visibleCats.forEach(c => state.openCats.add(c.category));
    }

    root.innerHTML = `
      <div class="controls">
        <div class="tabs">
          <button class="tab ${state.tab==='essential'?'active':''}" data-tab="essential">Top 50</button>
          <button class="tab ${state.tab==='extended'?'active':''}" data-tab="extended">Rozšířená (300+)</button>
          <button class="tab ${state.tab==='phrases'?'active':''}" data-tab="phrases">100 frází</button>
        </div>
        <input class="search" type="text" placeholder="Hledat slovíčko…" value="${state.query}" />
      </div>
      <div class="toggle-row">
        <button class="playallbtn" id="play-all-block">▶ Přehrát celý blok</button>
        <label class="check"><input type="checkbox" id="cz-toggle" ${state.speakCz?'checked':''}/> Přehrát i českou verzi</label>
        <div class="speed">
          <button data-mode="repeat" class="${state.mode==='repeat'?'active':''}" title="Polské slovo/frázi přehraje 2×, s pauzou na zopakování">Opakující se</button>
          <button data-mode="normal" class="${state.mode==='normal'?'active':''}" title="Přehraje jednou, s krátkou pauzou mezi položkami">Normálně</button>
        </div>
        <button class="stopbtn" id="stop-btn">⏹ Zastavit</button>
      </div>
      <div class="note">Nejlepší výslovnost dostaneš, když má telefon nainstalovaný polský hlas (na iOS: Nastavení → Přístupnost → Čtený obsah → Hlasy → Polština; na Androidu: Nastavení → Systém → Jazyky → Výstup převodu textu na řeč). Bez toho zařízení stejně zkusí polštinu přečíst, jen míň přesně.<br><br>Během přehrávání se stránka snaží zabránit zhasnutí displeje a přihlásit se jako přehrávač média (uvidíš ovládání i na zamykací obrazovce). Funguje to jen když stránku otevřeš přes <b>https://</b> (např. z GitHub Pages), ne z lokálního souboru. Na Androidu/Chrome by přehrávání mělo přežít i zhasnutý displej; na iOS Safari je to bohužel spolehlivé jen dokud stránku přímo nezavřeš nebo nepřepneš do jiné aplikace — to je omezení systému, ne stránky.</div>
      <div id="list"></div>
    `;

    const list = root.querySelector('#list');
    if (!visibleCats.length) {
      list.innerHTML = `<div class="empty">Nic nenalezeno${q ? ' pro „' + q + '“' : ''}.</div>`;
    } else {
      visibleCats.forEach(cat => {
        const isOpen = state.openCats.has(cat.category) || !!q;
        const catEl = document.createElement('div');
        catEl.className = 'cat' + (isOpen ? ' open' : '');
        catEl.innerHTML = `
          <div class="cat-head">
            <div class="cat-name">
              <span class="chev">▶</span>
              <span>${cat.category}</span>
              <span class="cat-count">${cat.words.length}</span>
            </div>
            <button class="play-all">▶ Přehrát vše</button>
          </div>
          <div class="cat-list"></div>
        `;
        const head = catEl.querySelector('.cat-head');
        head.addEventListener('click', (e) => {
          if (e.target.closest('.play-all')) return;
          catEl.classList.toggle('open');
          if (catEl.classList.contains('open')) state.openCats.add(cat.category);
          else state.openCats.delete(cat.category);
        });
        catEl.querySelector('.play-all').addEventListener('click', (e) => {
          e.stopPropagation();
          speakCategory(cat.words);
        });
        const listWrap = catEl.querySelector('.cat-list');
        cat.words.forEach(w => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div class="row-text">
              <div class="cz">${w.cz}</div>
              <div class="pl">${w.pl}</div>
              <div class="pron">${w.pron}</div>
            </div>
            <button class="play" title="Přehrát">🔊</button>
          `;
          row.querySelector('.play').addEventListener('click', () => {
            speakWord(w.cz, w.pl, row.querySelector('.play'));
          });
          listWrap.appendChild(row);
        });
        list.appendChild(catEl);
      });
    }

    root.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
    });
    const searchEl = root.querySelector('.search');
    searchEl.addEventListener('input', (e) => {
      const pos = e.target.selectionStart;
      state.query = e.target.value; render();
      const newSearch = root.querySelector('.search');
      newSearch.focus();
      newSearch.setSelectionRange(pos, pos);
    });
    root.querySelector('#cz-toggle').addEventListener('change', (e) => { state.speakCz = e.target.checked; });
    root.querySelectorAll('.speed button').forEach(btn => {
      btn.addEventListener('click', () => { state.mode = btn.dataset.mode; render(); });
    });
    root.querySelector('#stop-btn').addEventListener('click', stopAll);
    root.querySelector('#play-all-block').addEventListener('click', speakAllBlock);
  }

  render();
})();
</script>
</body>
</html>
